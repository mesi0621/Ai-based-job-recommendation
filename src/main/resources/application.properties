# Application Configuration
spring.application.name=ai-job-match
server.port=8080

# Database Configuration - H2 In-Memory
spring.datasource.url=jdbc:h2:mem:aijobmatch
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000
jwt.expiration.remember-me=2592000000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Service Configuration
ai.service.url=http://localhost:8001
ai.service.timeout.parsing=30000
ai.service.timeout.matching=10000

# Logging Configuration
logging.level.com.aijobmatch=DEBUG
logging.level.org.springframework.security=DEBUG
